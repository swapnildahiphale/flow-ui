name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7
        with:
          version: 9

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Build UI
        run: |
          pnpm -C ui install --frozen-lockfile
          pnpm -C ui build

      - name: Build binaries
        run: |
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/amd64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
                -o "dist/flow-ui-${target%/*}-${target#*/}" .
          done

      - name: Generate checksums
        working-directory: dist
        run: |
          shasum -a 256 flow-ui-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            dist/flow-ui-darwin-arm64
            dist/flow-ui-darwin-amd64
            dist/flow-ui-linux-amd64
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
