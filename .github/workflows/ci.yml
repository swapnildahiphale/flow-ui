name: CI

on:
  pull_request:
    branches: [main]

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.7
        with:
          version: 9
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Build UI (for embed)
        run: |
          pnpm -C ui install --frozen-lockfile
          pnpm -C ui build
      - run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.7
        with:
          version: 9
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Build UI (for embed)
        run: |
          pnpm -C ui install --frozen-lockfile
          pnpm -C ui build
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.7
        with:
          version: 9
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Build UI
        run: |
          pnpm -C ui install --frozen-lockfile
          pnpm -C ui build
      - run: go build ./...
